<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPW II - ITPM 2026</title>
    <style>
        :root { --primary: #c084fc; --dark: #1e293b; --bg: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; width: 90%; max-width: 800px; padding: 2rem; border-radius: 1rem; shadow: 0 10px 15px -3px rgba(0,0,0,0.1); border-left: 8px solid var(--primary); }
        h1 { color: var(--dark); margin-top: 0; }
        .badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem; }
        .box { border: 1px dashed #cbd5e1; padding: 1rem; border-radius: 0.5rem; }
    </style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="card">
        <span class="badge">Sistemas Informáticos</span>
        <h1>🌐 Diseño y Programación Web II</h1>
        <p><strong>Estudiante:</strong> [TU NOMBRE COMPLETO]</p>
        <hr>
        <div class="grid">
            <div class="box">
                <strong>🔧 Stack Tecnológico:</strong><br>
                PHP / MySQL / Laravel
            </div>
            <div class="box">
                <strong>📁 Proyecto Final:</strong><br>
                [Nombre de tu Sistema]
            </div>
        </div>
    </div>
</body>
</html>
